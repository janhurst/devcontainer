name: 'build' 
on: # rebuild any PRs and main branch changes
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout (GitHub)
        uses: actions/checkout@v2
        
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            tools:
              - 'tools/**'
            base:
              - 'base/**'      

      - name: Docker Login
        # You may pin to the exact commit or the version.
        # uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        uses: docker/login-action@v2.1.0
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          username: ${{ github.repository_owner }} # optional
          password: ${{ secrets.DOCKER_TOKEN }}
    
      - name: Build janhurst/devcontainer:tools
        if: steps.filter.outputs.tools == 'true' || github.event == 'workflow_dispatch'
        uses: devcontainers/ci@v0.2
        with:
          # Change this to point to your image name
          imageName: janhurst/devcontainer
          imageTag: tools
          cacheFrom: janhurst/devcontainer:tools
          subFolder: tools
          push: always
          
      - name: Build janhurst/devcontainer:base
        if: steps.filter.outputs.base == 'true' || github.event == 'workflow_dispatch' 
        uses: devcontainers/ci@v0.2
        with:
          # Change this to point to your image name
          imageName: janhurst/devcontainer
          imageTag: base
          cacheFrom: janhurst/devcontainer:base
          subFolder: base
          push: always          
